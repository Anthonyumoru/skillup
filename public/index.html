<!DOCTYPE html>
<html>
<head>
<title>SkillUp - Learn Skills, Earn Money</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0a0a0a;color:#fff;padding:20px;max-width:600px;margin:0 auto}
h1{color:#00ff88;margin:20px 0;text-align:center}
.card{background:#1a1a1a;padding:20px;border-radius:12px;margin:10px 0;border:1px solid #333}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#222;color:#fff;font-size:16px}
button{background:#00ff88;color:#000;font-weight:bold;cursor:pointer;border:none}
.balance{font-size:32px;color:#00ff88;font-weight:bold;text-align:center}
.skill{background:#222;padding:15px;margin:10px 0;border-radius:8px;cursor:pointer;border:1px solid #333}
.skill:hover{border-color:#00ff88}
.lesson{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:8px;border-left:4px solid #00ff88}
.admin-link{color:#00ff88;text-decoration:none;font-size:12px}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script>
const API = '';
let userId = localStorage.getItem('userId');

async function register() {
  let phone = prompt('Enter WhatsApp number: 080...');
  if(!phone) return;
  let res = await fetch(API + '/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone})});
  let data = await res.json();
  if(data.id) {
    localStorage.setItem('userId', data.id);
    userId = data.id;
    alert('Welcome! 2 free chats added 🎉');
    dashboard();
  } else alert('Error: ' + JSON.stringify(data));
}

async function dashboard() {
  let res = await fetch(API + '/user', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id: userId})});
  let user = await res.json();
  document.getElementById('app').innerHTML = `
    <h1>SkillUp 🚀</h1>
    <div class="card">
      <p style="text-align:center">Balance</p>
      <p class="balance">₦${user.balance || 0}</p>
      <p style="text-align:center">Free Chats: ${user.free_chats || 0} | Earned: ₦${user.total_earned || 0}</p>
      <button onclick="loadSkills()">Learn & Earn ₦5/lesson</button>
      <button onclick="showUpgrade()">Upgrade Premium ₦1000</button>
    </div>
    <p style="text-align:center"><a class="admin-link" href="/admin?key=mysecret123">Admin</a></p>
  `;
}

async function loadSkills() {
  let res = await fetch(API + '/skills');
  let skills = await res.json();
  document.getElementById('app').innerHTML = `<h1>Choose Skill</h1><button onclick="dashboard()">← Back</button>` +
    skills.map(s => `<div class="skill" onclick="loadLessons('${s.id}')"><h2>${s.icon} ${s.name}</h2><p>${s.total_lessons} lessons • ${s.difficulty} • ₦5 each</p></div>`).join('');
}

async function loadLessons(skillId) {
  let res = await fetch(API + '/lessons', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({skill_id: skillId})});
  let lessons = await res.json();
  document.getElementById('app').innerHTML = `<h1>Lessons</h1><button onclick="loadSkills()">← Back</button>` +
    lessons.map(l => `<div class="lesson"><h3>${l.title}</h3><p>${l.content}</p><p><b>Q: ${l.question}</b></p><input id="ans${l.id}" placeholder="Your answer"><button onclick="submitLesson('${l.id}')">Submit + Earn ₦5</button></div>`).join('');
}

async function submitLesson(lessonId) {
  let answer = document.getElementById('ans' + lessonId).value;
  if(!answer) return alert('Enter answer');
  let res = await fetch(API + '/submit-lesson', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id: userId, lesson_id: lessonId, answer})});
  let data = await res.json();
  alert(data.msg || data.error);
  if(data.success) dashboard();
}

async function showUpgrade() {
  let res = await fetch(API + '/bank-details');
  let bank = await res.json();
  alert(`Premium ₦1000\nPay to:\nBank: GTBank\nAccount: ${bank.bank_account}\nName: ${bank.bank_name}\n\nSend payment screenshot to admin to activate`);
}

if(!userId) register();
else dashboard();
</script>
</body>
  </html>
