<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillUp - Learn & Earn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0a0a0a;color:#fff;min-height:100vh}
.screen{display:none;padding:20px;max-width:500px;margin:0 auto;min-height:100vh}
.screen.active{display:block}
.login-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh}
h1{font-size:32px;margin-bottom:10px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#888;margin-bottom:40px;text-align:center}
input{width:100%;padding:15px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:16px;margin-bottom:15px}
button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
button:active{transform:scale(0.98)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.balance-card{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:25px;border-radius:20px;margin-bottom:30px}
.balance{font-size:36px;font-weight:700;margin:10px 0}
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.skill-card{background:#1a1a1a;padding:20px;border-radius:15px;border:1px solid #333;cursor:pointer}
.skill-card:active{transform:scale(0.95)}
.icon{font-size:32px;margin-bottom:10px}
.skill-name{font-weight:600;margin-bottom:5px}
.difficulty{font-size:12px;color:#888}
.lesson-card{background:#1a1a1a;padding:20px;border-radius:15px;margin-bottom:15px;border:1px solid #333;cursor:pointer}
.question{font-size:18px;margin:15px 0}
.back-btn{background:#333;margin-bottom:20px;width:auto;padding:10px 20px}
.success{color:#4ade80;text-align:center;margin-top:15px}
</style>
</head>
<body>

<div class="screen login-screen active" id="loginScreen">
  <h1>SkillUp</h1>
  <p class="subtitle">Learn skills. Earn money.</p>
  <input type="tel" id="phoneInput" placeholder="Enter phone number">
  <button onclick="login()">Start Learning</button>
</div>

<div class="screen" id="dashboardScreen">
  <div class="header">
    <h2>Dashboard</h2>
    <button onclick="logout()" style="width:auto;padding:8px 15px;background:#333">Logout</button>
  </div>
  <div class="balance-card">
    <div style="opacity:0.8">Your Balance</div>
    <div class="balance" id="balance">₦0</div>
    <div style="opacity:0.8">Total Earned: <span id="totalEarned">₦0</span> | Free Chats: <span id="freeChats">2</span></div>
  </div>
  <h3 style="margin-bottom:15px">Choose a Skill</h3>
  <div class="skill-grid" id="skillGrid"></div>
</div>

<div class="screen" id="lessonScreen">
  <button class="back-btn" onclick="showDashboard()">← Back</button>
  <h2 id="skillTitle"></h2>
  <div id="lessonList"></div>
</div>

<div class="screen" id="quizScreen">
  <button class="back-btn" onclick="backToLessons()">← Back</button>
  <div class="lesson-card">
    <h3 id="lessonTitle"></h3>
    <p id="lessonContent" style="color:#aaa;margin:15px 0"></p>
    <div class="question" id="question"></div>
    <input type="text" id="answerInput" placeholder="Type your answer">
    <button onclick="submitAnswer()">Submit & Earn ₦5</button>
    <div class="success" id="successMsg"></div>
  </div>
</div>

<script>
let currentUser = null;
let currentSkill = null;
let currentLesson = null;

async function login() {
  const phone = document.getElementById('phoneInput').value;
  if(!phone) return alert('Enter phone number');
  const res = await fetch('/register', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({phone})});
  currentUser = await res.json();
  showDashboard();
}

async function showDashboard() {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('dashboardScreen').classList.add('active');

  const res = await fetch('/user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: currentUser.id})});
  currentUser = await res.json();

  document.getElementById('balance').textContent = '₦' + currentUser.balance;
  document.getElementById('totalEarned').textContent = '₦' + currentUser.total_earned;
  document.getElementById('freeChats').textContent = currentUser.free_chats;

  const skillsRes = await fetch('/skills');
  const skills = await skillsRes.json();
  document.getElementById('skillGrid').innerHTML = skills.map(s => `
    <div class="skill-card" onclick="openSkill('${s.id}','${s.name}')">
      <div class="icon">${s.icon}</div>
      <div class="skill-name">${s.name}</div>
      <div class="difficulty">${s.difficulty}</div>
    </div>
  `).join('');
}

async function openSkill(skillId, skillName) {
  currentSkill = skillId;
  document.getElementById('skillTitle').textContent = skillName;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('lessonScreen').classList.add('active');

  const res = await fetch('/lessons', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({skill_id: skillId})});
  const lessons = await res.json();
  document.getElementById('lessonList').innerHTML = lessons.map(l => `
    <div class="lesson-card" onclick="openLesson(${l.id},'${l.title}','${l.content}','${l.question}')">
      <h4>${l.title}</h4>
      <p style="color:#888;font-size:14px;margin-top:8px">Tap to start →</p>
    </div>
  `).join('');
}

function openLesson(id, title, content, question) {
  currentLesson = id;
  document.getElementById('lessonTitle').textContent = title;
  document.getElementById('lessonContent').textContent = content;
  document.getElementById('question').textContent = question;
  document.getElementById('answerInput').value = '';
  document.getElementById('successMsg').textContent = '';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('quizScreen').classList.add('active');
}

async function submitAnswer() {
  const answer = document.getElementById('answerInput').value;
  const res = await fetch('/submit-lesson', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id: currentUser.id, lesson_id: currentLesson, answer})});
  const data = await res.json();
  if(data.success) {
    document.getElementById('successMsg').textContent = data.msg;
    setTimeout(() => { showDashboard(); }, 1500);
  } else {
    alert(data.error);
  }
}

function backToLessons() {
  openSkill(currentSkill, document.getElementById('skillTitle').textContent);
}

function logout() {
  currentUser = null;
  document.getElementById('phoneInput').value = '';
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('loginScreen').classList.add('active');
}
</script>
</body>
                                          </html>
